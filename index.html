<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorldTree Camp Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="brand">
        <div class="sigil" aria-hidden="true"><span></span></div>
        <div>
          <p class="eyebrow">WORLDTREE HQ</p>
          <h1>&#50900;&#46300;&#53944;&#47532; &#52896;&#54532;</h1>
          <p>&#51665;&#44208;, &#48373;&#44396;, &#52636;&#44201;.</p>
        </div>
      </section>

      <section class="identity panel">
        <label for="operatorName">&#51060;&#47492;</label>
        <input id="operatorName" value="Daejang" maxlength="24">
        <label for="operatorRole">&#50669;&#54624;</label>
        <select id="operatorRole">
          <option>Daejang</option>
          <option>Central</option>
          <option>HUD</option>
          <option>API</option>
          <option>QA</option>
          <option>Art</option>
          <option>Fix</option>
          <option>Baby</option>
        </select>
      </section>

      <nav class="channels panel" aria-label="channels">
        <button class="channel active" data-channel="camp">&#52896;&#54532;</button>
        <button class="channel" data-channel="central">&#51473;&#50521;</button>
        <button class="channel" data-channel="command">&#47749;&#47161;</button>
        <button class="channel" data-channel="hud">HUD</button>
        <button class="channel" data-channel="api">API</button>
        <button class="channel" data-channel="sl">&#49464;&#52968;&#46300;&#46972;&#51060;&#54532;</button>
        <button class="channel" data-channel="qa">QA</button>
        <button class="channel urgent" data-channel="urgent">&#44596;&#44553;</button>
      </nav>

      <section class="tools panel">
        <button id="insertTemplate" type="button">&#48372;&#44256; &#50577;&#49885;</button>
        <button id="refreshNow" type="button">&#49352;&#47196;&#44256;&#52840;</button>
        <button id="exportLog" type="button">&#47196;&#44536; &#51200;&#51109;</button>
      </section>

      <section class="roster panel">
        <div class="panelTitle">
          <span>&#51217;&#49549;&#51088;</span>
          <strong id="onlineCount">0</strong>
        </div>
        <div id="onlineUsers" class="onlineUsers"></div>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">WORLD TREE SIGNAL</p>
          <h2 id="channelTitle"># camp</h2>
          <p id="channelDesc">&#50900;&#46300;&#53944;&#47532; &#52395; &#51665;&#44208;&#51648;.</p>
        </div>
        <div class="status">
          <span id="backendState">&#49884;&#51089; &#51473;</span>
          <span id="clock"></span>
        </div>
      </header>

      <section class="notice">
        <strong>&#44508;&#52825;</strong>
        <span>&#48708;&#48128;&#53412; &#44552;&#51648;. &#53664;&#53360; &#44552;&#51648;. &#47676;&#51200; &#47784;&#51060;&#44256;, &#48736;&#47476;&#44172; &#44256;&#52828;&#45796;.</span>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <div class="tags" aria-label="message state">
          <label><input type="radio" name="tag" value="done"> &#50756;&#47308;</label>
          <label><input type="radio" name="tag" value="candidate" checked> &#54980;&#48372;</label>
          <label><input type="radio" name="tag" value="risk"> &#50948;&#54744;</label>
          <label><input type="radio" name="tag" value="missing"> &#45572;&#46973;</label>
          <label><input type="radio" name="tag" value="command"> &#47749;&#47161;</label>
        </div>
        <textarea id="messageInput" placeholder="&#47700;&#49884;&#51648; &#51077;&#47141;. Enter &#51204;&#49569; / Shift+Enter &#51460;&#48148;&#45000;. &#48708;&#48128;&#53412; &#44552;&#51648;." required rows="2"></textarea>
        <div class="composerActions">
          <span class="sendHint">Enter &#51204;&#49569; / Shift+Enter &#51460;&#48148;&#45000;</span>
          <button type="submit">&#48372;&#45236;&#44592;</button>
        </div>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
