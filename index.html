<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorldTree Camp Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="brand">
        <div class="sigil">WT</div>
        <div>
          <h1>월드트리 캠프</h1>
          <p>먼저 모이고, 빠르게 고친다.</p>
        </div>
      </section>

      <section class="identity">
        <label for="operatorName">이름</label>
        <input id="operatorName" value="Daejang" maxlength="24">
        <label for="operatorRole">역할</label>
        <select id="operatorRole">
          <option>Daejang</option>
          <option>Central</option>
          <option>HUD</option>
          <option>API</option>
          <option>QA</option>
          <option>Art</option>
          <option>Fix</option>
          <option>Baby</option>
        </select>
      </section>

      <nav class="channels" aria-label="Channels">
        <button class="channel active" data-channel="camp"># camp</button>
        <button class="channel" data-channel="central"># central</button>
        <button class="channel" data-channel="command"># command</button>
        <button class="channel" data-channel="hud"># hud</button>
        <button class="channel" data-channel="api"># api</button>
        <button class="channel" data-channel="sl"># second-life</button>
        <button class="channel" data-channel="qa"># qa</button>
        <button class="channel" data-channel="urgent"># urgent</button>
      </nav>

      <section class="tools">
        <button id="insertTemplate" type="button">보고 양식</button>
        <button id="refreshNow" type="button">새로고침</button>
        <button id="exportLog" type="button">로그 저장</button>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <h2 id="channelTitle"># camp</h2>
          <p id="channelDesc">WorldTree first gathering camp.</p>
        </div>
        <div class="status">
          <span id="backendState">시작 중</span>
          <span id="clock"></span>
        </div>
      </header>

      <section class="notice">
        <strong>규칙</strong>
        <span>비밀키 금지. 토큰 금지. 먼저 모이고 나중에 다듬는다.</span>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <div class="tags">
          <label><input type="radio" name="tag" value="done"> done</label>
          <label><input type="radio" name="tag" value="candidate" checked> candidate</label>
          <label><input type="radio" name="tag" value="risk"> risk</label>
          <label><input type="radio" name="tag" value="missing"> missing</label>
          <label><input type="radio" name="tag" value="command"> command</label>
        </div>
        <textarea id="messageInput" placeholder="메시지 입력. Enter 전송 / Shift+Enter 줄바꿈. 비밀키 금지." required rows="2"></textarea>
        <div class="composerActions">
          <span class="sendHint">Enter 전송 / Shift+Enter 줄바꿈</span>
          <button type="submit">보내기</button>
        </div>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
